name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  api:
    name: apps/api
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      # config/database.yml names the databases; these point them at the service container.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/houserota_api_test
      QUEUE_DATABASE_URL: postgres://postgres:postgres@localhost:5432/houserota_api_test_queue

    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          # Reads apps/api/.ruby-version.
          bundler-cache: true
          working-directory: apps/api

      - name: Prepare databases
        run: bin/rails db:prepare

      - name: Lint
        run: bundle exec rubocop -f github

      - name: Specs
        run: bundle exec rspec

      # The specs use Active Job's :test adapter, so they prove jobs are *enqueued* but
      # never that a worker drains them. This does: it boots a real Solid Queue worker
      # against the development databases and waits for it to finish a real job.
      - name: Solid Queue worker processes a job
        env:
          RAILS_ENV: development
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/houserota_api_development
          QUEUE_DATABASE_URL: postgres://postgres:postgres@localhost:5432/houserota_api_development_queue
          SMOKE_TIMEOUT_SECONDS: 60
        run: |
          bin/rails db:prepare

          # Detach the worker's stdout to a log. A background process that keeps the
          # step's stdout open can hang the runner even after the smoke script exits.
          bin/jobs > /tmp/solid_queue.log 2>&1 &
          JOBS_PID=$!

          set +e
          bin/rails runner script/solid_queue_smoke.rb
          SMOKE_STATUS=$?
          set -e

          kill "$JOBS_PID" 2>/dev/null || true
          wait "$JOBS_PID" 2>/dev/null || true

          if [ "$SMOKE_STATUS" -ne 0 ]; then
            echo "::group::Solid Queue worker log"
            cat /tmp/solid_queue.log || true
            echo "::endgroup::"
          fi

          exit "$SMOKE_STATUS"
