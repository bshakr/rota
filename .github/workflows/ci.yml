name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  # The JS half of the gate. `bin/ci` is the Rails equivalent; `npm run ci` is
  # this one, and running it locally is exactly what a PR hits.
  #
  # No .env is written here, deliberately. next.config.ts loads the repo-root
  # .env when one exists, and it is gitignored, so it never does in CI — which
  # means this job also proves the build does not secretly depend on it.
  web:
    name: apps/web
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci

      # Lint (includes the rule banning raw colours in components), typecheck,
      # the design-token gate, and a production build.
      - run: npm run ci

  api:
    name: apps/api
    runs-on: ubuntu-latest

    # The Solid Queue step runs a background worker. If it ever escaped its cleanup it
    # would hold the step open until GitHub's default 6-hour limit. This is the floor
    # under that.
    timeout-minutes: 15

    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Database NAMES come from config/database.yml. These are libpq's standard
      # connection variables: they say WHERE Postgres is, never which database. That
      # distinction matters — DATABASE_URL names a database and Rails applies it to
      # whichever environment is booting, so it is production-only and
      # config/application.rb deletes it everywhere else.
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres

    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          # Reads apps/api/.ruby-version.
          bundler-cache: true
          working-directory: apps/api

      # Setup, RuboCop, gem CVE audit, Brakeman SAST, and the specs. Defined in
      # config/ci.rb so that running `bin/ci` locally is exactly the gate a PR hits.
      - name: bin/ci
        env:
          RAILS_ENV: test
        run: bin/ci

      # The specs use Active Job's :test adapter, so they prove jobs are *enqueued* but
      # never that a worker drains them. This does: it boots a real Solid Queue worker
      # against the development databases and waits for it to finish a real job.
      - name: Solid Queue worker processes a job
        env:
          RAILS_ENV: development
          SMOKE_TIMEOUT_SECONDS: 60
        run: |
          bin/rails db:prepare

          # Detach the worker's stdout to a log. A background process that keeps the
          # step's stdout open can hang the runner even after the smoke script exits.
          bin/jobs > /tmp/solid_queue.log 2>&1 &
          JOBS_PID=$!

          set +e
          bin/rails runner script/solid_queue_smoke.rb
          SMOKE_STATUS=$?
          set -e

          kill "$JOBS_PID" 2>/dev/null || true
          wait "$JOBS_PID" 2>/dev/null || true

          if [ "$SMOKE_STATUS" -ne 0 ]; then
            echo "::group::Solid Queue worker log"
            cat /tmp/solid_queue.log || true
            echo "::endgroup::"
          fi

          exit "$SMOKE_STATUS"
