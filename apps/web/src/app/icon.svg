<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- The wordmark's sunrise tile. Raw hex is unavoidable here: an icon is
       fetched by the browser before any CSS exists, so it cannot read a token.
       (Token names written without their leading dashes: a double hyphen is
       illegal inside an XML comment.) The gradient stops track
       "gradient-sunrise" (sunshine-200 to flamingo-200 to iris-250) and the
       house glyph tracks twilight-900 (the foreground ink) in globals.css,
       matching the Wordmark tile. -->
  <defs>
    <linearGradient id="sunrise" x1="0" y1="0" x2="1" y2="0.47">
      <stop offset="0" stop-color="#f7e3b0"/>
      <stop offset="0.48" stop-color="#fdc8cb"/>
      <stop offset="1" stop-color="#d0beff"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#sunrise)"/>
  <path d="M8 15.2 16 8.5l8 6.7V23a1 1 0 0 1-1 1h-4.5v-5h-5v5H9a1 1 0 0 1-1-1z"
        fill="none" stroke="#2c2642" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
